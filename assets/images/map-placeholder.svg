<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <rect width="400" height="250" fill="#e5e9f2" stroke="#dddddd" stroke-width="1"/>
  
  <!-- Roads / Rivers Grid Mock -->
  <path d="M 0,60 L 400,100" stroke="#ffffff" stroke-width="12" fill="none"/>
  <path d="M 120,0 L 180,250" stroke="#ffffff" stroke-width="15" fill="none"/>
  <path d="M 0,180 L 400,160" stroke="#ffffff" stroke-width="10" fill="none"/>
  <path d="M 300,0 L 250,250" stroke="#ffffff" stroke-width="8" fill="none"/>
  
  <!-- River Krishna mock in background -->
  <path d="M 0,220 Q 150,200 280,240 T 400,210" stroke="#a5c9eb" stroke-width="25" fill="none" opacity="0.6"/>
  
  <!-- Map grids / highway lines -->
  <path d="M 0,60 L 400,100" stroke="#ffd966" stroke-width="3" fill="none"/>
  <path d="M 120,0 L 180,250" stroke="#ffd966" stroke-width="4" fill="none"/>
  
  <!-- Neighbor landmarks -->
  <rect x="30" y="20" width="60" height="25" rx="3" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="60" y="36" font-family="Arial, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Benz Circle</text>
  
  <rect x="220" y="110" width="80" height="25" rx="3" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="260" y="126" font-family="Arial, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Kanuru Road</text>
  
  <!-- Main Target Location Pin -->
  <g transform="translate(160, 90)">
    <circle cx="0" cy="0" r="15" fill="#1b365d" fill-opacity="0.2"/>
    <path d="M 0,0 C -8,-10 -12,-18 -12,-26 A 12,12 0 1,1 12,-26 C 12,-18 8,-10 0,0 Z" fill="#dc3545" stroke="#ffffff" stroke-width="1"/>
    <circle cx="0" cy="-26" r="5" fill="#ffffff"/>
  </g>
  
  <!-- Label bubble -->
  <rect x="70" y="30" width="180" height="30" rx="4" fill="#1b365d" stroke="#d4af37" stroke-width="1"/>
  <polygon points="160,60 155,65 165,65" fill="#1b365d" stroke="#d4af37" stroke-width="1"/>
  <!-- Hide bottom border of triangle -->
  <polygon points="156,60 160,63 164,60" fill="#1b365d"/>
  <text x="160" y="49" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">Vijayawada Branch of SIRC of ICAI</text>
</svg>
