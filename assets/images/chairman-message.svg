<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="140" height="140">
  <defs>
    <clipPath id="circleView">
      <circle cx="75" cy="75" r="70" />
    </clipPath>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#c5a059" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <circle cx="75" cy="75" r="73" fill="none" stroke="#c5a059" stroke-width="3"/>
  <circle cx="75" cy="75" r="70" fill="url(#avatarBg)"/>
  
  <g clip-path="url(#circleView)">
    <!-- Suit / Coat -->
    <path d="M 30,150 L 120,150 L 110,110 L 95,95 L 75,108 L 55,95 L 40,110 Z" fill="#1b365d" stroke="#144d8d" stroke-width="1"/>
    <!-- Tie / Collar -->
    <path d="M 68,90 L 82,90 L 75,108 Z" fill="#ffffff"/>
    <path d="M 73,95 L 77,95 L 77,130 L 73,130 Z" fill="#dc3545"/>
    <path d="M 68,90 L 75,100 L 82,90" fill="none" stroke="#1b365d" stroke-width="1.5"/>
    
    <!-- Face / Head -->
    <circle cx="75" cy="65" r="28" fill="#ffdbac"/>
    <!-- Hair -->
    <path d="M 45,60 C 45,35 105,35 105,60 C 95,45 55,45 45,60 Z" fill="#222222"/>
    <!-- Spectacles -->
    <rect x="58" y="58" width="14" height="8" rx="2" fill="none" stroke="#222222" stroke-width="1.5"/>
    <rect x="78" y="58" width="14" height="8" rx="2" fill="none" stroke="#222222" stroke-width="1.5"/>
    <line x1="72" y1="62" x2="78" y2="62" stroke="#222222" stroke-width="1.5"/>
    <!-- Ears -->
    <circle cx="46" cy="66" r="5" fill="#ffdbac"/>
    <circle cx="104" cy="66" r="5" fill="#ffdbac"/>
    <!-- Smile -->
    <path d="M 68,78 Q 75,83 82,78" fill="none" stroke="#222222" stroke-width="1.5"/>
  </g>
</svg>
